variant_id: pctct_heavy
label: "K3Z optional PCT + CT heavy subvariant"
description: "Single-intensity K3Z PCT->CT subvariant with heavy PCT (remove 3000 HW stems/ha) before CT."
patchworks:
  runtime_config: config/patchworks.runtime.pctct_heavy.windows.yaml
  analysis_pin: models/k3z_patchworks_model/analysis/pctct_heavy.pin
  tracks_dir: models/k3z_patchworks_model/tracks_pctct_heavy
  forestmodel_xml: models/k3z_patchworks_model/yield/forestmodel_pctct_heavy.xml
  fragments_shapefile: output/patchworks_k3z_pctct_heavy_validated/fragments/fragments.shp
  silviculture_config: config/silviculture.k3z.pctct_heavy.yaml
build:
  export_command: >-
    femic export patchworks --tsa k3z --instance-root external/femic-k3z-instance
    --output-dir output/patchworks_k3z_pctct_heavy_validated --seral-stage-config config/seral.k3z.yaml
    --silviculture-config config/silviculture.k3z.pctct_heavy.yaml
  publish_forestmodel_note: >-
    Treat the export primarily as the canonical PCT->CT heavy-subvariant
    ForestModel refresh. The accepted fragments surface must stay aligned to
    the baseline 218-fragment teaching footprint exactly with no
    AU/IFM/RETENTION/ORIGIN/SILV_STATE drift before matrix build.
  matrix_build_command: >-
    femic patchworks matrix-build --instance-root external/femic-k3z-instance
    --config config/patchworks.runtime.pctct_heavy.windows.yaml --run-id k3z_pctct_heavy
notes:
  - "Use this subvariant when a heavy PCT gate is required before CT."
  - "Patchworks launch entrypoint: analysis/pctct_heavy.pin"
