variant_id: baseline
label: "K3Z baseline teaching variant"
description: "Baseline K3Z Patchworks variant with the teaching retention policy and no optional silviculture treatment scaffold."
patchworks:
  runtime_config: config/patchworks.runtime.windows.yaml
  analysis_pin: models/k3z_patchworks_model/analysis/base.pin
  tracks_dir: models/k3z_patchworks_model/tracks
  forestmodel_xml: models/k3z_patchworks_model/yield/forestmodel.xml
  fragments_shapefile: output/patchworks_k3z_validated/fragments/fragments.shp
  silviculture_config: config/silviculture.k3z.baseline.yaml
build:
  export_command: >-
    femic export patchworks --tsa k3z --instance-root external/femic-k3z-instance
    --output-dir output/patchworks_k3z_validated --seral-stage-config config/seral.k3z.yaml
    --silviculture-config config/silviculture.k3z.baseline.yaml
  publish_forestmodel_note: >-
    After export, copy output/patchworks_k3z_validated/forestmodel.xml to
    models/k3z_patchworks_model/yield/forestmodel.xml before matrix build.
  matrix_build_command: >-
    femic patchworks matrix-build --instance-root external/femic-k3z-instance
    --config config/patchworks.runtime.windows.yaml --run-id k3z_baseline
notes:
  - "Use this variant for the default teaching baseline on main."
  - "Patchworks launch entrypoint: analysis/base.pin"
