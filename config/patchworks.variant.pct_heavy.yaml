variant_id: pct_heavy
label: "K3Z optional PCT heavy subvariant"
description: "Single-intensity K3Z PCT-only subvariant with heavy PCT (remove 3000 HW stems/ha) and the student thinners RETENTION overlay."
overlay:
  source_table: tmp/k3z_pct_thinners_retention_join.csv
  source_key: BLOCK
  retention_column: retention_thinners
patchworks:
  runtime_config: config/patchworks.runtime.pct_heavy.windows.yaml
  analysis_pin: models/k3z_patchworks_model/analysis/pct_heavy.pin
  tracks_dir: models/k3z_patchworks_model/tracks_pct_heavy
  forestmodel_xml: output/patchworks_k3z_pct_heavy_validated/forestmodel.xml
  fragments_shapefile: output/patchworks_k3z_pct_heavy_validated/fragments/fragments.shp
  silviculture_config: config/silviculture.k3z.pct_heavy.yaml
build:
  export_command: >-
    femic export patchworks --tsa k3z --instance-root external/femic-k3z-instance
    --output-dir output/patchworks_k3z_pct_heavy_validated --seral-stage-config config/seral.k3z.yaml
    --silviculture-config config/silviculture.k3z.pct_heavy.yaml
  publish_forestmodel_note: >-
    Treat the export primarily as the canonical PCT-only heavy-subvariant
    ForestModel refresh. The accepted fragments surface must stay aligned to
    the baseline 218-fragment teaching footprint exactly with no
    AU/IFM/ORIGIN/SILV_STATE drift before matrix build; RETENTION should come
    from the tracked student thinners overlay in tmp/k3z_pct_thinners_retention_join.csv.
  matrix_build_command: >-
    femic patchworks matrix-build --instance-root external/femic-k3z-instance
    --config config/patchworks.runtime.pct_heavy.windows.yaml --run-id k3z_pct_heavy
notes:
  - "Use this subvariant when a heavy PCT-only teaching surface is required."
  - "Patchworks launch entrypoint: analysis/pct_heavy.pin"
  - "Accepted validated fragments now use the student thinners RETENTION values instead of the old uniform 0.05 placeholder."
